name: CI Fix Loop

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  fix-regressions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 📊 DETECT & 🔍 DIAGNOSE & 🔧 FIX
        id: fix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== STEP 1: DETECT ==="
          set +e
          npx vitest run --reporter=verbose 2>&1
          EXIT_CODE=$?
          set -e

          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "✅ All tests pass, nothing to fix"
            echo "fix_applied=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "❌ Tests failed — starting diagnosis"

          echo "=== STEP 2: BISECT ==="
          # Find regression commit
          BAD_COMMIT=$(git log --oneline --grep="regression-sim" --format="%H" -1 || echo "")
          if [ -z "$BAD_COMMIT" ]; then
            echo "⚠️ No regression commit found, skipping"
            echo "fix_applied=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          CURRENT_MSG=$(git log --format=%s -1)
          if [[ "$CURRENT_MSG" == *"regression-sim"* ]]; then
            LAST_GOOD=$(git rev-parse HEAD~1)
          else
            LAST_GOOD=$(git rev-parse "$BAD_COMMIT~1")
          fi

          echo "Bad:  $BAD_COMMIT — $(git log --oneline $BAD_COMMIT -1)"
          echo "Good: $LAST_GOOD — $(git log --oneline $LAST_GOOD -1)"

          # Create bisect test script
          cat > /tmp/bisect-test.sh << 'BISECT_SCRIPT'
          #!/bin/bash
          npm ci 2>/dev/null || npm install 2>/dev/null
          npx vitest run --reporter=verbose 2>&1
          BISECT_SCRIPT
          chmod +x /tmp/bisect-test.sh

          git bisect start HEAD "$LAST_GOOD"
          git bisect run bash /tmp/bisect-test.sh 2>&1 || true
          git bisect reset 2>/dev/null || true

          echo "=== STEP 3: REVERT ==="
          COMMIT_MSG=$(git log --format=%s "$BAD_COMMIT" -1)

          if [[ "$COMMIT_MSG" != *"regression-sim"* ]]; then
            echo "⚠️ Not a regression-sim commit, safe check failed"
            echo "fix_applied=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Reverting $BAD_COMMIT..."
          if git revert --no-edit "$BAD_COMMIT" 2>&1; then
            echo "✅ Revert success"
          else
            echo "⚠️ Revert conflict, trying resolve strategy..."
            git revert --abort 2>/dev/null || true
            if git revert --no-edit --strategy=resolve "$BAD_COMMIT" 2>&1; then
              echo "✅ Resolve strategy success"
            else
              echo "❌ Revert failed"
              git revert --abort 2>/dev/null || true
              echo "fix_applied=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          echo "fix_applied=true" >> $GITHUB_OUTPUT
          echo "bad_commit=$BAD_COMMIT" >> $GITHUB_OUTPUT
          echo "REGRESSION_AUTHOR=$(git log --format='%an' $BAD_COMMIT -1)" >> $GITHUB_ENV

      - name: 📤 Push fix
        if: ${{ steps.fix.outputs.fix_applied == 'true' }}
        run: |
          git config user.name "CI Fix Bot"
          git config user.email "ci-fix-bot@ci-loop-lab"
          git push origin main
          echo "✅ Fix pushed to main"

      - name: 📝 Create Issue
        if: ${{ steps.fix.outputs.fix_applied == 'true' }}
        env:
          BAD_COMMIT: ${{ steps.fix.outputs.bad_commit }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FIX_DATE=$(date +%Y-%m-%d)
          BAD_MSG=$(git log --format="%s" "$BAD_COMMIT" -1)
          BAD_AUTHOR=$(git log --format="%an" "$BAD_COMMIT" -1)

          gh issue create \
            --title "[auto-fix] CI regression fixed — $FIX_DATE" \
            --body "## CI Auto-Fix Report

          **Date**: $FIX_DATE | **Status**: ✅ Fixed

          | Field | Value |
          |-------|-------|
          | Bad commit | \`$BAD_COMMIT\` |
          | Message | $BAD_MSG |
          | Author | $BAD_AUTHOR |
          | Fix | Auto revert |

          ### Timeline
          1. cron triggered fix loop
          2. Tests detected failure
          3. git bisect located regression
          4. Auto revert applied
          5. Fix pushed to main

          ### Action
          If this was intentional, check whether the revert lost desired changes." \
            --label "auto-fix,regression"
          echo "✅ Issue created"

      - name: 📋 Update STATE.md
        if: ${{ steps.fix.outputs.fix_applied == 'true' }}
        env:
          BAD_COMMIT: ${{ steps.fix.outputs.bad_commit }}
        run: |
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
          cat >> STATE.md << EOF

          ### $TIMESTAMP
          - 🔍 git bisect → \`$BAD_COMMIT\`
          - 🔧 Auto revert → success
          - 📝 Issue created
          - ✅ Status: Complete
          EOF
          git add STATE.md
          git commit -m "chore: update CI fix loop state [skip ci]" || true
          git push origin main || true
